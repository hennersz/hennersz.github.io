name: Setup Nix
description: Install Nix in single-user mode and cache /nix/store keyed on flake.{nix,lock}.

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        install_options: --no-daemon

    - name: Cache Nix store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-primary-key: never
        purge-last-accessed: 1209600
        # Before saving a new cache (primary-key miss), run GC so paths dropped from the flake
        # closure do not stay in the tarball forever. Only unreferenced store paths are removed;
        # `nix profile add .#saveFromGC` (see flake `packages.saveFromGC`) roots the CI shell + inputs.
        #
        # This value is a *ceiling* on store size after that GC (suffix K/M/G required — a bare
        # number is bytes). Lower = smaller cache and faster restore/unzip, but leave headroom
        # above your dev shell closure or saves may omit useful paths. Tune as needed.
        gc-max-store-size-linux: 1G

    - name: Root CI store paths for cache (saveFromGC)
      shell: bash
      run: nix profile add --impure .#saveFromGC